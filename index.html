<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSA</title>

<style>
body {
  margin: 0;
  background: black;
  color: white; /* 🔥 FIX FUENTE BLANCA */
  font-family: monospace;
}

#terminal {
  padding: 10px;
  white-space: pre-wrap;
  height: 90vh;
  overflow-y: auto;
}

button {
  width: 100%;
  padding: 10px;
  background: #111;
  color: white;
  border: 1px solid #333;
}
</style>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
</head>

<body>

<div id="terminal">Cargando Python...\n</div>
<button onclick="runPython()">▶ Ejecutar RSA</button>

<script>
let pyodide;
let term = document.getElementById("terminal");

function log(t){
  term.innerText += t + "\n";
}

async function init(){
  pyodide = await loadPyodide();

  // 🔥 FIX INPUT()
  pyodide.runPython(`
import js
import builtins

def input(prompt=""):
    return js.prompt(prompt)

builtins.input = input
  `);

  log("✔ Python listo");
}

async function runPython(){
  term.innerText = "";

  try {
    const code = await fetch("main.py").then(r => r.text());
    await pyodide.runPythonAsync(code);
  } catch(e){
    log("ERROR: " + e);
  }
}

init();
</script>

</body>
</html>
