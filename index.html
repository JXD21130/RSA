<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSA</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff; /* 🔥 fuente blanca FIX */
  font-family: monospace;
}

#terminal{
  padding:10px;
  height:90vh;
  overflow:auto;
  white-space:pre-wrap;
}

button{
  width:100%;
  padding:12px;
  background:#111;
  color:#fff;
  border:1px solid #333;
}
</style>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
</head>

<body>

<div id="terminal">Inicializando Python...\n</div>
<button onclick="run()">▶ Ejecutar RSA</button>

<script>
let pyodide;
let term = document.getElementById("terminal");

function log(t){
  term.innerText += t + "\n";
}

async function main(){
  pyodide = await loadPyodide();

  // 🔥 FIX REAL INPUT()
  pyodide.runPython(`
import js
import builtins

def input(prompt=""):
    return js.prompt(prompt)

builtins.input = input
  `);

  log("✔ Python listo");
}

async function run(){

  term.innerText = "";

  try {
    const code = await fetch("main.py").then(r => r.text());
    await pyodide.runPythonAsync(code);
  } catch(e){
    log("ERROR: " + e);
  }
}

main();
</script>

</body>
</html>
