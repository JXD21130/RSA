<script>
const terminal = document.getElementById('terminal');
const inputEl  = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const loading  = document.getElementById('loading');

let inputResolve = null;
let history = [];
let histIdx = -1;

function printLine(text, cls) {
  cls = cls || 'out';
  String(text).split('\n').forEach(function(l) {
    var div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = l;
    terminal.appendChild(div);
  });
  terminal.scrollTop = terminal.scrollHeight;
}

function echoInput(val) {
  var div = document.createElement('div');
  div.className = 'line inp';
  div.textContent = '> ' + val;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function waitForInput(prompt) {
  if (prompt) printLine(prompt, 'out');
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
  return new Promise(function(resolve) { inputResolve = resolve; });
}

window._waitForInput = waitForInput;

function submitInput() {
  if (!inputResolve) return;
  var val = inputEl.value;
  history.unshift(val);
  histIdx = -1;
  echoInput(val);
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  var resolve = inputResolve;
  inputResolve = null;
  resolve(val);
}

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitInput(); }
  if (e.key === 'ArrowUp') {
    if (histIdx < history.length - 1) { histIdx++; inputEl.value = history[histIdx]; }
  }
  if (e.key === 'ArrowDown') {
    if (histIdx > 0) { histIdx--; inputEl.value = history[histIdx]; }
    else { histIdx = -1; inputEl.value = ''; }
  }
});
sendBtn.addEventListener('click', submitInput);

const PYTHON_CODE = `
import math
import random
import base64
import string as _string

ABECEDARIO = {
    'a': 1,  'b': 2,  'c': 3,  'd': 4,  'e': 5,
    'f': 6,  'g': 7,  'h': 8,  'i': 9,  'j': 10,
    'k': 11, 'l': 12, 'm': 13, 'n': 14, 'o': 15,
    'p': 16, 'q': 17, 'r': 18, 's': 19, 't': 20,
    'u': 21, 'v': 22, 'w': 23, 'x': 24, 'y': 25,
    'z': 26
}

NUMERO_A_LETRA = {v: k for k, v in ABECEDARIO.items()}
MARCADOR_DIGITO = -1
OFFSET_DIGITO = 27


# ── Primalidad y generacion de primos ──

def es_primo_miller_rabin(n, k=20):
    if n < 2: return False
    if n == 2 or n == 3: return True
    if n % 2 == 0: return False
    r, d = 0, n - 1
    while d % 2 == 0:
        r += 1
        d //= 2
    for _ in range(k):
        a = random.randrange(2, n - 1)
        x = pow(a, d, n)
        if x == 1 or x == n - 1:
            continue
        for _ in range(r - 1):
            x = pow(x, 2, n)
            if x == n - 1:
                break
        else:
            return False
    return True


def primo_aleatorio(bits):
    while True:
        n = random.getrandbits(bits)
        n |= (1 << (bits - 1))
        n |= 1
        if es_primo_miller_rabin(n):
            return n


def cifras_a_bits(cifras):
    return math.ceil(cifras * math.log2(10))


# ── Codificacion DER / PEM ──

def encode_der_integer(n):
    length = max(1, (n.bit_length() + 7) // 8)
    raw = n.to_bytes(length, byteorder='big')
    if raw[0] & 0x80:
        raw = b'\\x00' + raw
    return encode_der_tlv(0x02, raw)


def encode_der_tlv(tag, value):
    length = len(value)
    if length < 0x80:
        len_bytes = bytes([length])
    elif length < 0x100:
        len_bytes = bytes([0x81, length])
    elif length < 0x10000:
        len_bytes = bytes([0x82, length >> 8, length & 0xFF])
    else:
        raise ValueError("Longitud demasiado grande")
    return bytes([tag]) + len_bytes + value


def generar_clave_publica_pem(n, e):
    seq = encode_der_integer(n) + encode_der_integer(e)
    der = encode_der_tlv(0x30, seq)
    b64 = base64.encodebytes(der).decode('ascii')
    return (
        "-----BEGIN RSA PUBLIC KEY-----\\n"
        + b64
        + "-----END RSA PUBLIC KEY-----"
    )


def generar_clave_privada_pem(n, e, d, p, q):
    dp = d % (p - 1)
    dq = d % (q - 1)
    qInv = pow(q, -1, p)
    seq = (
        encode_der_integer(0)
        + encode_der_integer(n)
        + encode_der_integer(e)
        + encode_der_integer(d)
        + encode_der_integer(p)
        + encode_der_integer(q)
        + encode_der_integer(dp)
        + encode_der_integer(dq)
        + encode_der_integer(qInv)
    )
    der = encode_der_tlv(0x30, seq)
    b64 = base64.encodebytes(der).decode('ascii')
    return (
        "-----BEGIN RSA PRIVATE KEY-----\\n"
        + b64
        + "-----END RSA PRIVATE KEY-----"
    )


# ── Generacion de claves (async) ──

async def generar_claves_rsa():
    print()
    print("Generador de claves RSA")
    print("-" * 40)
    print("Pulsa ENTER en cualquier campo para usar un tamano aleatorio.")
    print()

    entrada_n = (await _input("Cuantas cifras quieres que tenga n? (ENTER = aleatorio): ")).strip()
    if entrada_n == "":
        cifras_n = random.randint(4, 20)
        print(f"  -> Cifras de n elegidas aleatoriamente: {cifras_n}")
    else:
        cifras_n = int(entrada_n)

    bits_n = cifras_a_bits(cifras_n)
    bits_primo = max(bits_n // 2, 8)

    print(f"\\nGenerando primos p y q (~{bits_primo} bits cada uno)...")

    p = primo_aleatorio(bits_primo)
    q = primo_aleatorio(bits_primo)
    while q == p:
        q = primo_aleatorio(bits_primo)

    n = p * q
    phi = (p - 1) * (q - 1)

    print(f"  p = {p}")
    print(f"  q = {q}")
    print(f"  n = {n}  ({len(str(n))} cifras)")

    entrada_e = (await _input("\\nCuantas cifras quieres que tenga e? (ENTER = 65537): ")).strip()

    if entrada_e == "":
        e = 65537
        if math.gcd(e, phi) != 1:
            e = 3
            while math.gcd(e, phi) != 1:
                e += 2
        print(f"  -> e estandar: {e}")
    else:
        cifras_e = int(entrada_e)
        bits_e = cifras_a_bits(cifras_e)
        intentos = 0
        while True:
            candidato = random.getrandbits(bits_e)
            candidato |= (1 << (bits_e - 1))
            candidato |= 1
            if math.gcd(candidato, phi) == 1:
                e = candidato
                break
            intentos += 1
            if intentos > 100000:
                print("  No se encontro e valido con ese tamano, usando 65537.")
                e = 65537
                break

    d = pow(e, -1, phi)

    pem_pub  = generar_clave_publica_pem(n, e)
    pem_priv = generar_clave_privada_pem(n, e, d, p, q)

    print()
    print("=" * 50)
    print("CLAVES GENERADAS")
    print("=" * 50)
    print(f"p    = {p}")
    print(f"q    = {q}")
    print(f"n    = {n}")
    print(f"phi  = {phi}")
    print(f"e    = {e}")
    print(f"d    = {d}")
    print()
    print(pem_pub)
    print()
    print(pem_priv)
    print()
    print("(En el navegador no se puede guardar ficheros.")
    print(" Copia el texto de arriba manualmente si lo necesitas.)")


# ── Abecedario / seed ──

def generar_abecedario_con_seed(seed):
    letras = list("abcdefghijklmnopqrstuvwxyz")
    try:
        numeros = list(map(int, seed.split("-")))
        if len(numeros) == 26:
            return dict(zip(letras, numeros))
    except ValueError:
        pass
    numeros = list(range(1, 27))
    random.seed(seed)
    random.shuffle(numeros)
    return dict(zip(letras, numeros))


def texto_a_numeros(texto):
    numeros = []
    for ch in texto:
        if ch == " ":
            numeros.append(0)
        elif ch.lower() in ABECEDARIO:
            numeros.append(ABECEDARIO[ch.lower()])
        elif ch.isdigit():
            numeros.append(MARCADOR_DIGITO)
            numeros.append(OFFSET_DIGITO + int(ch))
        else:
            print(f"Ignorado: {ch}")
    return numeros


def numeros_a_texto(numeros):
    resultado = []
    i = 0
    while i < len(numeros):
        v = numeros[i]
        if v == 0:
            resultado.append(" ")
        elif v == MARCADOR_DIGITO:
            i += 1
            if i < len(numeros):
                digito = numeros[i] - OFFSET_DIGITO
                if 0 <= digito <= 9:
                    resultado.append(str(digito))
        elif v in NUMERO_A_LETRA:
            resultado.append(NUMERO_A_LETRA[v])
        else:
            resultado.append(f"[{v}]")
        i += 1
    return "".join(resultado)


def mostrar_abecedario():
    print("\\nCorrespondencia actual:")
    print("-" * 40)
    for letra, numero in ABECEDARIO.items():
        print(f"{letra} = {numero}")
    print("-" * 40)
    print()


# ── Funciones RSA async ──

async def _input(prompt=''):
    return str(await __builtins__.__dict__['_js_wait'](str(prompt)))


async def elegir_modo_rsa():

async def crear_seed_personalizada():
    letras = list("abcdefghijklmnopqrstuvwxyz")
    asignaciones = {l: i + 1 for i, l in enumerate(letras)}
    print("\\nIntroduce intercambios.")
    print("Ejemplo: a c")
    print("Escribe 'listo' para terminar.\\n")
    while True:
        entrada = (await _input("Intercambio: ")).strip().lower()
        if entrada == "listo":
            break
        partes = entrada.split()
        if len(partes) != 2:
            print("Error: escribe dos letras separadas por espacio")
            continue
        l1, l2 = partes
        if l1 not in asignaciones or l2 not in asignaciones:
            print("Letras invalidas")
            continue
        asignaciones[l1], asignaciones[l2] = asignaciones[l2], asignaciones[l1]
        print(f"OK {l1} <-> {l2}")
    seed = "-".join(str(asignaciones[l]) for l in letras)
    print("\\nSeed generada:")
    print(seed)
    print()


async def buscar_seed_string():
    print("\\nBuscador de seeds tipo string")
    print("--------------------------------")
    condiciones = {}
    while True:
        letra = (await _input("Letra (ENTER para terminar): ")).lower().strip()
        if letra == "":
            break
        if letra not in _string.ascii_lowercase:
            print("Letra invalida")
            continue
        try:
            numero = int(await _input(f"Numero para '{letra}': "))
        except ValueError:
            print("Numero invalido")
            continue
        if numero < 1 or numero > 26:
            print("Fuera de rango")
            continue
        condiciones[letra] = numero
    longitud = int(await _input("\\nLongitud de la seed: "))
    letras_seed = _string.ascii_lowercase
    intentos = 0
    print("\\nBuscando...\\n")
    while True:
        seed = "".join(random.choice(letras_seed) for _ in range(longitud))
        abecedario = generar_abecedario_con_seed(seed)
        cumple = all(abecedario[l] == num for l, num in condiciones.items())
        if cumple:
            print("=" * 50)
            print("SEED ENCONTRADA")
            print("=" * 50)
            print(f"\\nSeed:\\n{seed}")
            print("\\nCondiciones:")
            for l in sorted(condiciones):
                print(f"{l} = {abecedario[l]}")
            print("\\nAbecedario completo:")
            for l, num in abecedario.items():
                print(f"{l} = {num}")
            print("=" * 50)
            break
        intentos += 1
        if intentos % 10000 == 0:
            print(f"Intentos: {intentos}")


async def start():
    print("")
    print("Cifrado y descifrado RSA")
    print("----------------------------")
    print("g -> generar claves RSA")
    print("n -> numeros")
    print("l -> letras")
    print("s -> seed personalizada")

    if modo.lower() in ("g", "generar"):

    elif modo.lower() in ("n", "numeros"):

        if opcion.lower() in ("c", "cifrar"):

        elif opcion.lower() in ("d", "descifrar"):

    elif modo.lower() in ("l", "letras"):

        if seed:
            ABECEDARIO.update(generar_abecedario_con_seed(seed))
            NUMERO_A_LETRA.clear()
            NUMERO_A_LETRA.update({v: k for k, v in ABECEDARIO.items()})
        mostrar_abecedario()
        opcion = await _input("cifrar o descifrar (c/d): ")
        if opcion.lower() in ("c", "cifrar"):
            await cifrar_texto()
        elif opcion.lower() in ("d", "descifrar"):
            await descifrar_texto()

    elif modo.lower() in ("s", "seed"):
        await crear_seed_personalizada()

    elif modo.lower() in ("b", "buscar"):
        await buscar_seed_string()

    else:
        print("Opcion invalida")

    reiniciar = await _input("\\nReiniciar? (y/n): ")
    if reiniciar.lower() in ("y", ""):
        await start()

await start()

async function main() {
  const pyodide = await loadPyodide();

  pyodide.setStdout({ batched: function(text) { printLine(text, 'out'); } });
  pyodide.setStderr({ batched: function(text) { printLine(text, 'err'); } });

  // Pasar waitForInput a globals de Python
  pyodide.globals.set('_js_wait', function(prompt) {
    return waitForInput(prompt ? prompt.toString() : '');
  });

  // Inyectarlo en builtins para que _input() lo encuentre
  await pyodide.runPythonAsync(`
import builtins
builtins.__dict__['_js_wait'] = _js_wait
`);

  loading.style.display = 'none';
  printLine('Python 3.11 listo.', 'info');

  await pyodide.runPythonAsync(PYTHON_CODE).catch(function(e) {
    printLine('', 'out');
    printLine('Error: ' + e.message, 'err');
  });

  printLine('', 'out');
  printLine('-- Programa terminado. Recarga la pagina para reiniciar. --', 'info');
  inputEl.disabled = true;
  sendBtn.disabled = true;
  inputEl.placeholder = 'Recarga la pagina para reiniciar';
}

main().catch(function(e) {
  loading.style.display = 'none';
  printLine('Error al cargar Pyodide: ' + e.message, 'err');
});
