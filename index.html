<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --border: #2a2a2a;
    --border2: #333;
    --green: #00ff88;
    --green2: #00cc66;
    --amber: #ffcc00;
    --red: #ff4444;
    --blue: #4488ff;
    --muted: #555;
    --muted2: #888;
    --text: #e0e0e0;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
  }

  #app {
    display: flex;
    height: 100vh;
    flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 38px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  #topbar-left { display: flex; align-items: center; gap: 12px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #28c840; }
  #topbar-title { color: var(--muted2); font-size: 11px; letter-spacing: 0.08em; }
  #topbar-right { display: flex; gap: 8px; align-items: center; }

  .tb-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .tb-btn:hover { border-color: var(--green); color: var(--green); }

  /* MAIN AREA */
  #main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* FILE PANEL */
  #file-panel {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #file-panel-header {
    padding: 10px 12px 8px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #file-panel-header span { color: var(--muted2); }
  .fp-action {
    background: none; border: none; color: var(--muted); font-size: 14px;
    cursor: pointer; padding: 0 3px; line-height: 1;
  }
  .fp-action:hover { color: var(--green); }

  #file-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .file-item {
    display: flex;
    align-items: center;
    padding: 5px 12px;
    cursor: pointer;
    gap: 7px;
    font-size: 12px;
    color: var(--muted2);
    border-left: 2px solid transparent;
    transition: all 0.1s;
  }
  .file-item:hover { background: var(--bg3); color: var(--text); border-left-color: var(--border2); }
  .file-item.active { background: var(--bg3); color: var(--green); border-left-color: var(--green); }
  .file-item .fi-icon { font-size: 11px; opacity: 0.6; }
  .file-item .fi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fi-del { opacity: 0; font-size: 12px; color: var(--red); }
  .file-item:hover .fi-del { opacity: 1; }

  #file-actions {
    padding: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }
  .file-btn {
    flex: 1;
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 4px;
    cursor: pointer;
    border-radius: 3px;
    text-align: center;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .file-btn:hover { border-color: var(--green); color: var(--green); }

  /* EDITOR PANEL */
  #editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #editor-header {
    padding: 8px 14px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  #editor-filename { color: var(--amber); }
  #editor-save-btn {
    background: none; border: 1px solid var(--border2);
    color: var(--muted2); font-family: var(--mono); font-size: 10px;
    padding: 3px 8px; cursor: pointer; border-radius: 3px;
    transition: all 0.15s; letter-spacing: 0.04em;
  }
  #editor-save-btn:hover { border-color: var(--amber); color: var(--amber); }

  #editor-area {
    flex: 1;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 14px;
    resize: none;
    outline: none;
    overflow-y: auto;
  }
  #editor-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  /* TERMINAL */
  #terminal-panel {
    width: 520px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #term-header {
    padding: 8px 14px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  #term-clear {
    background: none; border: none; color: var(--muted); font-family: var(--mono);
    font-size: 10px; cursor: pointer; letter-spacing: 0.04em;
  }
  #term-clear:hover { color: var(--red); }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .line { white-space: pre-wrap; word-break: break-all; line-height: 1.55; font-size: 12.5px; }
  .line.prompt { color: var(--green); }
  .line.output-text { color: var(--text); }
  .line.success { color: var(--green2); }
  .line.error { color: var(--red); }
  .line.info { color: var(--blue); }
  .line.label { color: var(--amber); }
  .line.muted { color: var(--muted2); }
  .line.pem { color: #99bbff; font-size: 11px; }
  .line.sep { color: var(--border2); }

  #input-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    gap: 8px;
    flex-shrink: 0;
  }
  #prompt-symbol { color: var(--green); font-size: 13px; flex-shrink: 0; }
  #cmd-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    caret-color: var(--green);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Hidden upload */
  #upload-input { display: none; }

  /* Modal for PEM paste */
  #modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal.show { display: flex; }
  #modal-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 20px;
    width: 560px;
    max-width: 95vw;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #modal-title { font-size: 11px; color: var(--muted2); letter-spacing: 0.08em; }
  #modal-textarea {
    background: var(--bg);
    border: 1px solid var(--border2);
    color: #99bbff;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    padding: 10px;
    border-radius: 3px;
    resize: vertical;
    min-height: 200px;
    outline: none;
  }
  #modal-textarea:focus { border-color: var(--blue); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    background: none; border: 1px solid var(--border2); color: var(--muted2);
    font-family: var(--mono); font-size: 11px; padding: 5px 14px;
    cursor: pointer; border-radius: 3px; transition: all 0.15s;
  }
  .modal-btn.confirm { border-color: var(--green); color: var(--green); }
  .modal-btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="topbar-left">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span id="topbar-title">rsa — cifrado y descifrado</span>
    </div>
    <div id="topbar-right">
      <button class="tb-btn" onclick="downloadAllFiles()">exportar</button>
      <button class="tb-btn" onclick="document.getElementById('upload-input').click()">importar .txt</button>
    </div>
  </div>

  <div id="main">
    <!-- FILE PANEL -->
    <div id="file-panel">
      <div id="file-panel-header">
        <span>ARCHIVOS</span>
        <div style="display:flex;gap:4px">
          <button class="fp-action" title="Nuevo archivo" onclick="newFile()">+</button>
        </div>
      </div>
      <div id="file-list"></div>
      <div id="file-actions">
        <button class="file-btn" onclick="newFile()">nuevo</button>
        <button class="file-btn" onclick="document.getElementById('upload-input').click()">subir</button>
        <button class="file-btn" onclick="downloadCurrentFile()">bajar</button>
      </div>
    </div>

    <!-- EDITOR PANEL -->
    <div id="editor-panel">
      <div id="editor-header">
        <span id="editor-filename">sin archivo</span>
        <button id="editor-save-btn" onclick="saveCurrentFile()">guardar</button>
      </div>
      <div id="editor-placeholder">selecciona o crea un archivo</div>
      <textarea id="editor-area" style="display:none;" spellcheck="false" oninput="onEditorInput()"></textarea>
    </div>

    <!-- TERMINAL -->
    <div id="terminal-panel">
      <div id="term-header">
        <span>TERMINAL</span>
        <button id="term-clear" onclick="clearTerminal()">limpiar</button>
      </div>
      <div id="output"></div>
      <div id="input-row">
        <span id="prompt-symbol">›</span>
        <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="upload-input" accept=".txt" multiple onchange="handleUpload(event)" />

<!-- PEM Modal -->
<div id="modal">
  <div id="modal-box">
    <div id="modal-title">PEGAR BLOQUE PEM</div>
    <textarea id="modal-textarea" placeholder="-----BEGIN ...-----&#10;...&#10;-----END ...-----"></textarea>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal(null)">cancelar</button>
      <button class="modal-btn confirm" onclick="closeModal(document.getElementById('modal-textarea').value)">aceptar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  BIG INTEGER HELPERS (native BigInt)
// ═══════════════════════════════════════════════════════

function modPow(base, exp, mod) {
  if (mod === 1n) return 0n;
  let result = 1n;
  base = base % mod;
  while (exp > 0n) {
    if (exp % 2n === 1n) result = result * base % mod;
    exp = exp >> 1n;
    base = base * base % mod;
  }
  return result;
}

function modInverse(a, m) {
  // Extended Euclidean
  let [old_r, r] = [a, m];
  let [old_s, s] = [1n, 0n];
  while (r !== 0n) {
    let q = old_r / r;
    [old_r, r] = [r, old_r - q * r];
    [old_s, s] = [s, old_s - q * s];
  }
  if (old_r !== 1n) throw new Error('No tiene inverso modular');
  return ((old_s % m) + m) % m;
}

function millerRabin(n, k = 20) {
  if (n < 2n) return false;
  if (n === 2n || n === 3n) return true;
  if (n % 2n === 0n) return false;
  let r = 0n, d = n - 1n;
  while (d % 2n === 0n) { r++; d /= 2n; }
  for (let i = 0; i < k; i++) {
    const a = 2n + BigInt(Math.floor(Math.random() * Number(n - 4n)));
    let x = modPow(a, d, n);
    if (x === 1n || x === n - 1n) continue;
    let cont = false;
    for (let j = 0n; j < r - 1n; j++) {
      x = modPow(x, 2n, n);
      if (x === n - 1n) { cont = true; break; }
    }
    if (!cont) return false;
  }
  return true;
}

function randomBigInt(bits) {
  const bytes = Math.ceil(bits / 8);
  const arr = new Uint8Array(bytes);
  crypto.getRandomValues(arr);
  arr[0] |= 0x80;
  arr[bytes - 1] |= 0x01;
  let n = 0n;
  for (const b of arr) n = (n << 8n) | BigInt(b);
  return n;
}

function randomPrime(bits) {
  while (true) {
    let n = randomBigInt(bits);
    if (millerRabin(n)) return n;
  }
}

function gcd(a, b) {
  a = a < 0n ? -a : a;
  b = b < 0n ? -b : b;
  while (b !== 0n) { [a, b] = [b, a % b]; }
  return a;
}

function digitsToN(digits) {
  // rough bits from digit count
  return Math.ceil(digits * Math.log2(10));
}

// ═══════════════════════════════════════════════════════
//  ABECEDARIO
// ═══════════════════════════════════════════════════════

const DEFAULT_ABC = {
  a:1,b:2,c:3,d:4,e:5,f:6,g:7,h:8,i:9,j:10,
  k:11,l:12,m:13,n:14,o:15,p:16,q:17,r:18,s:19,t:20,
  u:21,v:22,w:23,x:24,y:25,z:26
};

let ABECEDARIO = {...DEFAULT_ABC};
let NUMERO_A_LETRA = Object.fromEntries(Object.entries(ABECEDARIO).map(([k,v])=>[v,k]));

const MARCADOR_DIGITO = -1;
const OFFSET_DIGITO = 27;

function resetAbc() {
  ABECEDARIO = {...DEFAULT_ABC};
  NUMERO_A_LETRA = Object.fromEntries(Object.entries(ABECEDARIO).map(([k,v])=>[v,k]));
}

function applyAbc(abc) {
  ABECEDARIO = {...abc};
  NUMERO_A_LETRA = Object.fromEntries(Object.entries(ABECEDARIO).map(([k,v])=>[v,k]));
}

function genAbcWithSeed(seed) {
  seed = seed.trim();
  // Numeric seed "1-2-3-..."
  const parts = seed.split('-');
  if (parts.length === 26 && parts.every(p => !isNaN(p))) {
    const nums = parts.map(Number);
    const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
    return Object.fromEntries(letters.map((l, i) => [l, nums[i]]));
  }
  // String seed → seeded shuffle
  const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const nums = Array.from({length:26}, (_,i) => i+1);
  // LCG seeded shuffle
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (Math.imul(31, h) + seed.charCodeAt(i)) >>> 0;
  function rand() { h = (Math.imul(1664525, h) + 1013904223) >>> 0; return h / 0x100000000; }
  for (let i = nums.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [nums[i], nums[j]] = [nums[j], nums[i]];
  }
  return Object.fromEntries(letters.map((l, i) => [l, nums[i]]));
}

function randomSeed(len = 8) {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let s = '';
  for (let i = 0; i < len; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

// ═══════════════════════════════════════════════════════
//  TEXTO ↔ NÚMEROS
// ═══════════════════════════════════════════════════════

function textoANumeros(txt) {
  const out = [];
  for (const ch of txt) {
    if (ch === ' ') { out.push(0); }
    else if (ABECEDARIO[ch.toLowerCase()] !== undefined) { out.push(ABECEDARIO[ch.toLowerCase()]); }
    else if (/\d/.test(ch)) { out.push(MARCADOR_DIGITO); out.push(OFFSET_DIGITO + parseInt(ch)); }
  }
  return out;
}

function numerosATexto(nums) {
  let out = '';
  for (let i = 0; i < nums.length; i++) {
    const v = nums[i];
    if (v === 0) out += ' ';
    else if (v === MARCADOR_DIGITO) {
      i++;
      if (i < nums.length) { const d = nums[i] - OFFSET_DIGITO; if (d >= 0 && d <= 9) out += d; }
    } else if (NUMERO_A_LETRA[v]) out += NUMERO_A_LETRA[v];
    else out += `[${v}]`;
  }
  return out;
}

// ═══════════════════════════════════════════════════════
//  DER / PEM ENCODING
// ═══════════════════════════════════════════════════════

function bigIntToBytes(n) {
  if (n === 0n) return new Uint8Array([0]);
  const bits = n.toString(2).length;
  const len = Math.ceil(bits / 8);
  const arr = new Uint8Array(len);
  let tmp = n;
  for (let i = len - 1; i >= 0; i--) { arr[i] = Number(tmp & 0xffn); tmp >>= 8n; }
  return arr;
}

function encodeLen(len) {
  if (len < 0x80) return new Uint8Array([len]);
  if (len < 0x100) return new Uint8Array([0x81, len]);
  if (len < 0x10000) return new Uint8Array([0x82, len >> 8, len & 0xff]);
  throw new Error('Longitud demasiado grande');
}

function encodeDERInt(n) {
  let raw = bigIntToBytes(n);
  if (raw[0] & 0x80) { const tmp = new Uint8Array(raw.length + 1); tmp[0] = 0; tmp.set(raw, 1); raw = tmp; }
  const lenBytes = encodeLen(raw.length);
  return concat([new Uint8Array([0x02]), lenBytes, raw]);
}

function encodeDERSeq(inner) {
  const lenBytes = encodeLen(inner.length);
  return concat([new Uint8Array([0x30]), lenBytes, inner]);
}

function concat(arrays) {
  const total = arrays.reduce((s, a) => s + a.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const a of arrays) { out.set(a, off); off += a.length; }
  return out;
}

function toBase64(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s);
}

function fromBase64(s) {
  const bin = atob(s.replace(/\s/g, ''));
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function wrapPEM(label, bytes) {
  const b64 = toBase64(bytes);
  const lines = b64.match(/.{1,64}/g).join('\n');
  return `-----BEGIN ${label}-----\n${lines}\n-----END ${label}-----`;
}

function stripPEM(pem) {
  const b64 = pem.replace(/-----BEGIN [A-Z0-9 ]+-----/g, '')
                  .replace(/-----END [A-Z0-9 ]+-----/g, '')
                  .replace(/\s/g, '');
  return fromBase64(b64);
}

function decodeDERTLV(data, off) {
  const tag = data[off++];
  let lb = data[off++], length;
  if (lb < 0x80) length = lb;
  else if (lb === 0x81) { length = data[off++]; }
  else if (lb === 0x82) { length = (data[off] << 8) | data[off+1]; off += 2; }
  else throw new Error('Longitud DER no soportada');
  return { tag, value: data.slice(off, off + length), next: off + length };
}

function decodeDERInt(bytes) {
  let n = 0n;
  for (const b of bytes) n = (n << 8n) | BigInt(b);
  return n;
}

// RSA Public Key PEM (formato propio)
function genPubKeyPEM(n, e) {
  const seq = concat([encodeDERInt(n), encodeDERInt(e)]);
  return wrapPEM('RSA PUBLIC KEY', encodeDERSeq(seq));
}

function parsePubKeyPEM(pem) {
  const der = stripPEM(pem);
  const { value: seqVal } = decodeDERTLV(der, 0);
  let off = 0;
  const nTLV = decodeDERTLV(seqVal, off);
  const eTLV = decodeDERTLV(seqVal, nTLV.next);
  return { n: decodeDERInt(nTLV.value), e: decodeDERInt(eTLV.value) };
}

// RSA Private Key PEM (PKCS#1-like)
function genPrivKeyPEM(n, e, d, p, q) {
  const dp = d % (p - 1n);
  const dq = d % (q - 1n);
  const qInv = modInverse(q, p);
  const seq = concat([
    encodeDERInt(0n), encodeDERInt(n), encodeDERInt(e), encodeDERInt(d),
    encodeDERInt(p), encodeDERInt(q), encodeDERInt(dp), encodeDERInt(dq), encodeDERInt(qInv)
  ]);
  return wrapPEM('RSA PRIVATE KEY', encodeDERSeq(seq));
}

function parsePrivKeyPEM(pem) {
  const der = stripPEM(pem);
  const { value: seqVal } = decodeDERTLV(der, 0);
  let off = 0;
  const ver = decodeDERTLV(seqVal, off); off = ver.next;
  const nT  = decodeDERTLV(seqVal, off); off = nT.next;
  const eT  = decodeDERTLV(seqVal, off); off = eT.next;
  const dT  = decodeDERTLV(seqVal, off); off = dT.next;
  const pT  = decodeDERTLV(seqVal, off); off = pT.next;
  const qT  = decodeDERTLV(seqVal, off); off = qT.next;
  return {
    n: decodeDERInt(nT.value), e: decodeDERInt(eT.value),
    d: decodeDERInt(dT.value), p: decodeDERInt(pT.value), q: decodeDERInt(qT.value)
  };
}

// Encrypted message PEM
function numsToPEM(nums) {
  const parts = [];
  for (const num of nums) {
    const isNeg = num < 0n;
    const abs = isNeg ? -num : num;
    const nb = bigIntToBytes(abs);
    const sign = new Uint8Array([isNeg ? 1 : 0]);
    const lenBytes = new Uint8Array(4);
    new DataView(lenBytes.buffer).setUint32(0, nb.length, false);
    parts.push(sign, lenBytes, nb);
  }
  return wrapPEM('RSA ENCRYPTED MESSAGE', concat(parts));
}

function pemToNums(pem) {
  const data = stripPEM(pem);
  const nums = [];
  let i = 0;
  while (i < data.length) {
    const sign = data[i++];
    const len = new DataView(data.buffer, data.byteOffset + i, 4).getUint32(0, false); i += 4;
    const nb = data.slice(i, i + len); i += len;
    let val = 0n;
    for (const b of nb) val = (val << 8n) | BigInt(b);
    nums.push(sign === 1 ? -val : val);
  }
  return nums;
}

// MPI format (for sign)
function encodeMPI(n) {
  const b = bigIntToBytes(n);
  const hdr = new Uint8Array(2);
  new DataView(hdr.buffer).setUint16(0, b.length, false);
  return concat([hdr, b]);
}

function decodeMPI(data, off) {
  const len = new DataView(data.buffer, data.byteOffset + off, 2).getUint16(0, false);
  off += 2;
  let val = 0n;
  for (let i = 0; i < len; i++) val = (val << 8n) | BigInt(data[off + i]);
  return { value: val, next: off + len };
}

function genSignPEM(firma) { return wrapPEM('RSA SIGN', bigIntToBytes(firma)); }
function parseSignPEM(pem) {
  const data = stripPEM(pem);
  let n = 0n; for (const b of data) n = (n << 8n) | BigInt(b); return n;
}
function genPublicKeysMPI(n, e) { return wrapPEM('PUBLIC KEYS', concat([encodeMPI(n), encodeMPI(e)])); }
function parsePublicKeysMPI(pem) {
  const data = stripPEM(pem);
  const nR = decodeMPI(data, 0);
  const eR = decodeMPI(data, nR.next);
  return { n: nR.value, e: eR.value };
}
function genSignAndPubKeysPEM(firma, n, e) {
  return wrapPEM('RSA SIGN AND PUBLIC KEYS', concat([encodeMPI(firma), encodeMPI(n), encodeMPI(e)]));
}
function parseSignAndPubKeysPEM(pem) {
  const data = stripPEM(pem);
  const fR = decodeMPI(data, 0);
  const nR = decodeMPI(data, fR.next);
  const eR = decodeMPI(data, nR.next);
  return { firma: fR.value, n: nR.value, e: eR.value };
}

// ═══════════════════════════════════════════════════════
//  SHA-256 (Web Crypto)
// ═══════════════════════════════════════════════════════

async function sha256BigInt(msg) {
  const enc = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  const arr = new Uint8Array(hash);
  let n = 0n;
  for (const b of arr) n = (n << 8n) | BigInt(b);
  return n;
}

//  DETECT KEYS / MESSAGE IN TXT
// ═══════════════════════════════════════════════════════

function detectKeysInTxt(content) {
  const claves = {};
  const patterns = {
    n: /n\s*=\s*(\d+)/,
    e: /e\s*=\s*(\d+)/,
    d: /d\s*=\s*(\d+)/,
    p: /p\s*=\s*(\d+)/,
    q: /q\s*=\s*(\d+)/,
    phi: /φ\(n\)\s*=\s*(\d+)/,
  };
  for (const [k, re] of Object.entries(patterns)) {
    const m = content.match(re);
    if (m) claves[k] = BigInt(m[1]);
  }
  const mSeed = content.match(/Seed\s*:\s*(.+)/);
  if (mSeed) claves.seed = mSeed[1].trim();
  const mModo = content.match(/[Cc]ifrado con\s*:\s*([ed])/i);
  if (mModo) claves.modo_cifrado = mModo[1].toLowerCase();

  // PEM public
  if (content.includes('-----BEGIN RSA PUBLIC KEY-----')) {
    try {
      const start = content.indexOf('-----BEGIN RSA PUBLIC KEY-----');
      const end = content.indexOf('-----END RSA PUBLIC KEY-----') + '-----END RSA PUBLIC KEY-----'.length;
      const pem = content.slice(start, end);
      const { n, e } = parsePubKeyPEM(pem);
      claves.n = n; claves.e = e; claves.pem_publica = pem;
    } catch(ex){}
  }
  // PEM private
  if (content.includes('-----BEGIN RSA PRIVATE KEY-----')) {
    try {
      const start = content.indexOf('-----BEGIN RSA PRIVATE KEY-----');
      const end = content.indexOf('-----END RSA PRIVATE KEY-----') + '-----END RSA PRIVATE KEY-----'.length;
      const pem = content.slice(start, end);
      const { n, e, d, p, q } = parsePrivKeyPEM(pem);
      claves.n = n; claves.e = e; claves.d = d; claves.p = p; claves.q = q; claves.pem_privada = pem;
    } catch(ex){}
  }
  return claves;
}

function detectMessageInTxt(content) {
  if (content.includes('-----BEGIN RSA ENCRYPTED MESSAGE-----')) {
    const start = content.indexOf('-----BEGIN RSA ENCRYPTED MESSAGE-----');
    const end = content.indexOf('-----END RSA ENCRYPTED MESSAGE-----') + '-----END RSA ENCRYPTED MESSAGE-----'.length;
    if (end > start) return { tipo: 'pem_mensaje', datos: content.slice(start, end) };
  }
  for (const line of content.split('\n')) {
    const l = line.trim();
    if (!l || l.startsWith('─') || l.startsWith('=') || l.includes(':')) continue;
    const parts = l.split(/\s+/);
    if (parts.length >= 2) {
      try {
        const nums = parts.map(p => BigInt(p));
        if (nums.some(n => n < -100n || n > 100n)) return { tipo: 'numeros', datos: nums };
      } catch(e) {}
    }
  }
  return { tipo: null, datos: null };
}

//  ASYNC INPUT QUEUE
// ═══════════════════════════════════════════════════════

let inputQueue = [];
let inputResolvers = [];
let pemModalResolve = null;
let historyBuf = [];
let histIdx = -1;
let pendingPrompt = '';

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < historyBuf.length - 1) { histIdx++; cmdInput.value = historyBuf[historyBuf.length - 1 - histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; cmdInput.value = historyBuf[historyBuf.length - 1 - histIdx]; }
    else { histIdx = -1; cmdInput.value = ''; }
  } else if (e.key === 'Enter') {
    const val = cmdInput.value;
    cmdInput.value = '';
    histIdx = -1;
    if (val.trim()) historyBuf.push(val);
    print((pendingPrompt ? pendingPrompt : '›') + ' ' + val, 'prompt');
    pendingPrompt = '';
    if (inputResolvers.length > 0) {
      const res = inputResolvers.shift();
      res(val);
    } else {
      inputQueue.push(val);
    }
  }
});

function askInput(promptStr) {
  return new Promise(resolve => {
    if (promptStr) { print(promptStr, 'label'); pendingPrompt = '›'; }
    if (inputQueue.length > 0) { resolve(inputQueue.shift()); return; }
    inputResolvers.push(resolve);
  });
}

async function generarClaves() {
  printSep();
  const cifrasStr = (await askInput('cifras para n (Enter = aleatorio):')).trim();
  let cifrasN;
  if (!cifrasStr) { cifrasN = Math.floor(Math.random() * 21) + 10; print(`cifras: ${cifrasN}`, 'muted'); }
  else cifrasN = parseInt(cifrasStr);

  const bitsN = digitsToN(cifrasN);
  const bitsPrimo = Math.max(Math.floor(bitsN / 2), 8);
  print('generando primos...', 'muted');

  let p = randomPrime(bitsPrimo);
  let q = randomPrime(bitsPrimo);
  while (q === p) q = randomPrime(bitsPrimo);
  const n = p * q;
  const phi = (p - 1n) * (q - 1n);

  const cifrasEStr = (await askInput('cifras para e (Enter = usar 65537):')).trim();
  let e;
  if (!cifrasEStr) {
    e = 65537n;
    if (gcd(e, phi) !== 1n) { e = 3n; while (gcd(e, phi) !== 1n) e += 2n; }
  } else {
    const bitsE = digitsToN(parseInt(cifrasEStr));
    let tries = 0;
    while (true) {
      e = randomPrime(bitsE);
      if (gcd(e, phi) === 1n) break;
      if (++tries > 1000) { e = 65537n; break; }
    }
  }
  const d = modInverse(e, phi);

  const pemPub = genPubKeyPEM(n, e);
  const pemPriv = genPrivKeyPEM(n, e, d, p, q);

  printBlank();
  printSep();
  print(`p   = ${p}`, 'label');
  print(`q   = ${q}`, 'label');
  print(`n   = ${n}`, 'label');
  print(`φ(n)= ${phi}`, 'label');
  print(`e   = ${e}`, 'label');
  print(`d   = ${d}`, 'label');
  printBlank();
  printPEM(pemPub);
  printBlank();
  printPEM(pemPriv);
  printBlank();

  // optional message
  const cifrarQ = (await askInput('¿cifrar un mensaje ahora? (y/n):')).trim().toLowerCase();
  let msgOrig = null, cifradosMsg = null, pemMsg = null, seedUsada = null, modoCifrado = null;

  if (['y','si','s'].includes(cifrarQ)) {
    print('1 → cifrar con e', 'muted'); print('2 → cifrar con d', 'muted');
    const modoStr = (await askInput('')).trim();
    modoCifrado = modoStr === '2' ? 'd' : 'e';
    const exp = modoCifrado === 'd' ? d : e;

    seedUsada = await pedirSeed();
    if (seedUsada) {
      applyAbc(genAbcWithSeed(seedUsada));
      printBlank(); mostrarAbecedario();
    }

    const textoMsg = await askInput('texto a cifrar:');
    const numsMsg = textoANumeros(textoMsg);
    cifradosMsg = numsMsg.map(v => {
      if (v === MARCADOR_DIGITO) return -modPow(1n, exp, n);
      if (v === 0) return 0n;
      return modPow(BigInt(v), exp, n);
    });
    // recompute properly
    const cifradosMsgFix = numsMsg.map(v => {
      if (v === MARCADOR_DIGITO) return -modPow(BigInt(Math.abs(MARCADOR_DIGITO)), exp, n);
      if (v === 0) return 0n;
      return modPow(BigInt(v), exp, n);
    });
    pemMsg = numsToPEM(cifradosMsgFix);
    msgOrig = textoMsg;
    cifradosMsg = cifradosMsgFix;

    printBlank();
    print(cifradosMsgFix.map(x => x.toString()).join(' '), 'success');
    printBlank();
    printPEM(pemMsg);
    printBlank();
  }

  // save files
  const seedTxt = seedUsada || '(normal)';
  const modoTxt = modoCifrado === 'e' ? 'e (clave pública)' : modoCifrado === 'd' ? 'd (clave privada)' : '';
  let bloqueMsg = '';
  if (msgOrig !== null) {
    bloqueMsg = `\n── Mensaje cifrado ──\nMensaje original: ${msgOrig}\nSeed            : ${seedTxt}\nCifrado con     : ${modoTxt}\nNúmeros         : ${cifradosMsg.map(x=>x.toString()).join(' ')}\n\n${pemMsg}\n`;
  }
  const pubContent = `=== CLAVE PÚBLICA RSA ===\n\n── Números ──\nn = ${n}\ne = ${e}\n\n── PEM ──\n${pemPub}\n${bloqueMsg}`;
  const privContent = `=== CLAVES RSA COMPLETAS ===\n\n── Números ──\np = ${p}\nq = ${q}\nn = ${n}\nφ(n) = ${phi}\ne = ${e}\nd = ${d}\n\n── PEM clave pública ──\n${pemPub}\n\n── PEM clave privada ──\n${pemPriv}\n${bloqueMsg}`;

  writeFile('clave_publica.txt', pubContent);
  writeFile('claves_completas.txt', privContent);
  printBlank();
  print('✓ clave_publica.txt', 'success');
  print('✓ claves_completas.txt', 'success');
  if (msgOrig) { print('✓ mensaje incluido en los ficheros', 'success'); }
  resetAbc();
}

  if (claves.n && claves.e) {
    const usar = (await askInput(`¿usar n y e del archivo? (y/n):`)).trim().toLowerCase();
    if (['y','si','s',''].includes(usar)) { n = claves.n; e = claves.e; d = claves.d || null; p = claves.p || null; q = claves.q || null; }
    else { ({ n, e, d, p, q } = await obtenerClavesPublicas()); }
  } else { ({ n, e, d, p, q } = await obtenerClavesPublicas()); }

  const modo = await elegirModoRSA();
  let exp = modo === 'e' ? e : (d ?? BigInt((await askInput('d:')).trim()));
  const modoCifrado = modo;

  const seedUsada = await pedirSeed();
  if (seedUsada) { applyAbc(genAbcWithSeed(seedUsada)); }

  const nums = textoANumeros(mensaje);
  const cifrados = nums.map(v => {
    if (v === MARCADOR_DIGITO) return -modPow(BigInt(Math.abs(MARCADOR_DIGITO)), exp, n);
    if (v === 0) return 0n;
    return modPow(BigInt(v), exp, n);
  });
  const pemMsg = numsToPEM(cifrados);
  const pemPub = genPubKeyPEM(n, e);

  printBlank();
  print(cifrados.map(x=>x.toString()).join(' '), 'success');
  printBlank();
  printPEM(pemMsg);

  const guardar = (await askInput('\n¿guardar en archivo? (y/n):')).trim().toLowerCase();
  if (['y','si','s',''].includes(guardar)) {
    let nombreSal = (await askInput('nombre del archivo de salida (Enter = mensaje_cifrado.txt):')).trim();
    if (!nombreSal) nombreSal = 'mensaje_cifrado.txt';
    const contenido = `=== MENSAJE CIFRADO RSA ===\n\nSeed            : ${seedUsada || '(normal)'}\nCifrado con     : ${modoCifrado === 'e' ? 'e (debes descifrar con d)' : 'd (debes descifrar con e)'}\n── PEM MENSAJE ──\n${pemMsg}\n\n── PEM CLAVE PÚBLICA ──\n${pemPub}\n`;
    writeFile(nombreSal, contenido);
    print(`✓ guardado: ${nombreSal}`, 'success');
  }
  resetAbc();
}

async function descifrarDesdeTxt() {
  printSep();
  const nombre = (await askInput('nombre del archivo TXT:')).trim();
  const content = readFile(nombre);
  if (content === null) { print(`✗ no encontrado: ${nombre}`, 'error'); return; }

  const claves = detectKeysInTxt(content);
  const { tipo, datos } = detectMessageInTxt(content);

  if (Object.keys(claves).length) {
    print('claves detectadas:', 'label');
    for (const [k, v] of Object.entries(claves)) {
      if (!['pem_publica','pem_privada'].includes(k)) print(`  ${k} = ${v}`, 'muted');
    }
  }

  let cifrados;
  if (tipo === 'pem_mensaje') {
    print('✓ mensaje PEM detectado', 'success');
    try { cifrados = pemToNums(datos); print(`  ${cifrados.length} elementos`, 'muted'); } catch(ex) { print(`✗ error PEM: ${ex}`, 'error'); return; }
  } else if (tipo === 'numeros') {
    print('✓ números cifrados detectados', 'success');
    cifrados = datos;
  } else {
    print('no se detectó mensaje. Elige:', 'muted');
    print('1 → introducir números manualmente', 'muted'); print('2 → pegar PEM', 'muted');
    const op = (await askInput('')).trim();
    if (op === '1') {
      const en = (await askInput('números separados por espacios:')).trim();
      try { cifrados = en.split(/\s+/).map(s => BigInt(s)); } catch(e) { print('✗ error', 'error'); return; }
    } else if (op === '2') {
      const pem = await leerPEM();
      try { cifrados = pemToNums(pem); } catch(ex) { print(`✗ error: ${ex}`, 'error'); return; }
    } else { print('inválido', 'error'); return; }
  }

  let n;
  if (claves.n) {
    const usar = (await askInput(`¿usar n=${claves.n}? (y/n):`)).trim().toLowerCase();
    n = ['y','si','s',''].includes(usar) ? claves.n : BigInt((await askInput('n:')).trim());
  } else n = BigInt((await askInput('n:')).trim());

  const modoDetectado = claves.modo_cifrado;
  let exp;
  if (modoDetectado === 'e') {
    print('✓ cifrado con e → descifrar con d', 'info');
    if (claves.d) { print(`✓ usando d del archivo`, 'success'); exp = claves.d; }
    else exp = BigInt((await askInput('d:')).trim());
  } else if (modoDetectado === 'd') {
    print('✓ cifrado con d → descifrar con e', 'info');
    if (claves.e) { print(`✓ usando e del archivo`, 'success'); exp = claves.e; }
    else exp = BigInt((await askInput('e:')).trim());
  } else {
    print('modo no detectado. El mensaje fue cifrado con:', 'muted');
    print('1 → e (descifrar con d)', 'muted'); print('2 → d (descifrar con e)', 'muted');
    const modo = (await askInput('')).trim();
    if (modo === '1' || !modo) {
      if (claves.d) { const u = (await askInput(`¿usar d=${claves.d}? (y/n):`)).trim().toLowerCase(); exp = ['y','si','s',''].includes(u) ? claves.d : BigInt((await askInput('d:')).trim()); }
      else exp = BigInt((await askInput('d:')).trim());
    } else {
      if (claves.e) { const u = (await askInput(`¿usar e=${claves.e}? (y/n):`)).trim().toLowerCase(); exp = ['y','si','s',''].includes(u) ? claves.e : BigInt((await askInput('e:')).trim()); }
      else exp = BigInt((await askInput('e:')).trim());
    }
  }

  let seedUsada;
  if (claves.seed && claves.seed !== '(normal)') {
    const us = (await askInput(`¿usar seed "${claves.seed}"? (y/n):`)).trim().toLowerCase();
    seedUsada = ['y','si','s',''].includes(us) ? claves.seed : await pedirSeed();
  } else seedUsada = await pedirSeed();

  if (seedUsada) applyAbc(genAbcWithSeed(seedUsada));

  const descifrados = cifrados.map(c => {
    if (c < 0n) return MARCADOR_DIGITO;
    if (c === 0n) return 0;
    return Number(modPow(c, exp, n));
  });

  printBlank();
  print(numerosATexto(descifrados), 'success');
  printBlank();
  resetAbc();
}

async function firmarMensaje() {
  printSep();
  const mensaje = await askInput('mensaje a firmar:');
  const hashBig = await sha256BigInt(mensaje);
  print(`hash: ${hashBig}`, 'muted');
  const { n, e, d } = await obtenerClavesPublicas();
  const dVal = d ?? BigInt((await askInput('d:')).trim());
  const firma = modPow(hashBig, dVal, n);
  printBlank();
  print(`firma: ${firma}`, 'success');
  printBlank();
  const pemFirma = genSignPEM(firma);
  const pemPubKeys = genPublicKeysMPI(n, e);
  const pemSAP = genSignAndPubKeysPEM(firma, n, e);
  printPEM(pemFirma);
  printBlank();
  printPEM(pemPubKeys);
  printBlank();
  printPEM(pemSAP);
}

async function verificarFirma() {
  printSep();
  const mensaje = await askInput('mensaje:');
  const firmaStr = await askInput('firma (entero):');
  const firma = BigInt(firmaStr.trim());
  const nStr = await askInput('n:');
  const eStr = await askInput('e:');
  const n = BigInt(nStr.trim()), e = BigInt(eStr.trim());
  const hashBig = await sha256BigInt(mensaje);
  const hashMod = hashBig % n;
  const resultado = modPow(firma, e, n);
  printBlank();
  print(`hash esperado: ${hashMod}`, 'muted');
  print(`hash recibido: ${resultado}`, 'muted');
  printBlank();
  if (resultado === hashMod) print('✓ FIRMA VÁLIDA', 'success');
  else print('✗ FIRMA INVÁLIDA', 'error');
  printBlank();
}

async function menuSeeds() {
  printSep();
  print('1 → seed personalizada (intercambios)', 'muted');
  print('2 → generar seed aleatoria', 'muted');
  print('3 → mostrar abecedario con seed', 'muted');
  const op = (await askInput('')).trim();
  if (op === '1') {
    print('introduce intercambios (ej: a c). "listo" para terminar', 'muted');
    const abc = {...DEFAULT_ABC};
    while (true) {
      const en = (await askInput('intercambio:')).trim().toLowerCase();
      if (en === 'listo' || en === '') break;
      const [l1, l2] = en.split(/\s+/);
      if (!l1 || !l2 || !abc[l1] || !abc[l2]) { print('✗ inválido', 'error'); continue; }
      [abc[l1], abc[l2]] = [abc[l2], abc[l1]];
      print(`✓ ${l1} ↔ ${l2}`, 'success');
    }
    const seed = Object.values(abc).join('-');
    printBlank(); print('seed generada:', 'label'); print(seed, 'success');
  } else if (op === '2') {
    const seed = randomSeed();
    print(`✓ seed: ${seed}`, 'success');
  } else if (op === '3') {
    const s = await pedirSeed();
    if (s) { applyAbc(genAbcWithSeed(s)); mostrarAbecedario(); resetAbc(); }
    else mostrarAbecedario();
  }
}

// PEM Universal
async function menuPEMUniversal() {
  printSep();
  print('1 → decodificar PEM', 'muted');
  print('2 → codificar PEM', 'muted');
  const op = (await askInput('')).trim();

  if (op === '1') {
    const pem = await leerPEM();
    const mLabel = pem.match(/-----BEGIN ([A-Z0-9 ]+)-----/);
    if (!mLabel) { print('✗ cabecera PEM inválida', 'error'); return; }
    const label = mLabel[1].trim();
    printBlank(); print(`tipo: ${label}`, 'label'); printSep();
    try {
      if (label === 'RSA PUBLIC KEY') { const { n, e } = parsePubKeyPEM(pem); print(`n = ${n}`, 'label'); print(`e = ${e}`, 'label'); }
      else if (label === 'RSA PRIVATE KEY') { const { n, e, d, p, q } = parsePrivKeyPEM(pem); print(`n=${n}`, 'label'); print(`e=${e}`, 'label'); print(`d=${d}`, 'label'); print(`p=${p}`, 'label'); print(`q=${q}`, 'label'); }
      else if (label === 'RSA ENCRYPTED MESSAGE') { const nums = pemToNums(pem); print(`${nums.length} números:`, 'muted'); print(nums.map(x=>x.toString()).join(' '), 'success'); }
      else if (label === 'RSA SIGN') { print(`firma = ${parseSignPEM(pem)}`, 'label'); }
      else if (label === 'PUBLIC KEYS') { const { n, e } = parsePublicKeysMPI(pem); print(`n = ${n}`, 'label'); print(`e = ${e}`, 'label'); }
      else if (label === 'RSA SIGN AND PUBLIC KEYS') { const { firma, n, e } = parseSignAndPubKeysPEM(pem); print(`firma = ${firma}`, 'label'); print(`n = ${n}`, 'label'); print(`e = ${e}`, 'label'); }
      else print(`✗ tipo no reconocido: ${label}`, 'error');
    } catch(ex) { print(`✗ error: ${ex}`, 'error'); }

  } else if (op === '2') {
    print('1 → RSA PUBLIC KEY', 'muted'); print('2 → RSA PRIVATE KEY', 'muted');
    print('3 → RSA ENCRYPTED MESSAGE', 'muted'); print('4 → RSA SIGN', 'muted');
    print('5 → PUBLIC KEYS', 'muted'); print('6 → RSA SIGN AND PUBLIC KEYS', 'muted');
    const subop = (await askInput('')).trim();
    try {
      if (subop === '1') {
        const n = BigInt((await askInput('n:')).trim()); const e = BigInt((await askInput('e:')).trim());
        printBlank(); printPEM(genPubKeyPEM(n, e));
      } else if (subop === '2') {
        const n = BigInt((await askInput('n:')).trim()); const e = BigInt((await askInput('e:')).trim());
        const d = BigInt((await askInput('d:')).trim()); const p = BigInt((await askInput('p:')).trim());
        const q = BigInt((await askInput('q:')).trim());
        printBlank(); printPEM(genPrivKeyPEM(n, e, d, p, q));
      } else if (subop === '3') {
        const en = (await askInput('números cifrados:')).trim();
        const nums = en.split(/\s+/).map(s => BigInt(s));
        printBlank(); printPEM(numsToPEM(nums));
      } else if (subop === '4') {
        const f = BigInt((await askInput('firma:')).trim());
        printBlank(); printPEM(genSignPEM(f));
      } else if (subop === '5') {
        const n = BigInt((await askInput('n:')).trim()); const e = BigInt((await askInput('e:')).trim());
        printBlank(); printPEM(genPublicKeysMPI(n, e));
      } else if (subop === '6') {
        const f = BigInt((await askInput('firma:')).trim());
        const n = BigInt((await askInput('n:')).trim()); const e = BigInt((await askInput('e:')).trim());
        printBlank(); printPEM(genSignAndPubKeysPEM(f, n, e));
      } else print('inválido', 'error');
    } catch(ex) { print(`✗ error: ${ex}`, 'error'); }
  }
}

async function showMainMenu() {
  printBlank();
  printSep();
  print('1  números — cifrar/descifrar', 'muted');
  print('2  letras  — cifrar/descifrar', 'muted');
  print('3  generar claves RSA', 'muted');
  print('4  cifrar desde TXT', 'muted');
  print('5  descifrar desde TXT', 'muted');
  print('6  firma digital', 'muted');
  print('7  verificar firma', 'muted');
  print('8  seeds', 'muted');
  print('9  PEM universal', 'muted');
  print('10 mostrar abecedario', 'muted');
  printSep();
}

let running = false;

async function runProgram() {
  if (running) return;
  running = true;
  print('RSA — cifrado y descifrado', 'label');
  while (true) {
    await showMainMenu();
    const op = (await askInput('')).trim();

    if (op === '1') {
      print('1 → cifrar', 'muted'); print('2 → descifrar', 'muted');
      const sub = (await askInput('')).trim();
      if (sub === '1') await cifrarNumero().catch(e => print(`✗ ${e}`, 'error'));
      else if (sub === '2') await descifrarNumero().catch(e => print(`✗ ${e}`, 'error'));

    } else if (op === '2') {
      const seed = await pedirSeed('seed (vacío = normal, "random" = aleatoria):');
      if (seed) applyAbc(genAbcWithSeed(seed));
      printBlank(); mostrarAbecedario(); printBlank();
      print('1 → cifrar', 'muted'); print('2 → descifrar', 'muted');
      const sub = (await askInput('')).trim();
      if (sub === '1') await cifrarTexto().catch(e => print(`✗ ${e}`, 'error'));
      else if (sub === '2') await descifrarTexto().catch(e => print(`✗ ${e}`, 'error'));
      resetAbc();

    } else if (op === '3') await generarClaves().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '4') await cifrarDesdeTxt().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '5') await descifrarDesdeTxt().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '6') await firmarMensaje().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '7') await verificarFirma().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '8') await menuSeeds().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '9') await menuPEMUniversal().catch(e => print(`✗ ${e}`, 'error'));
    else if (op === '10') { printBlank(); mostrarAbecedario(); }
    else { print('opción inválida', 'error'); }
  }
}
