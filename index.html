<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #161616;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  #topbar span { margin-left: 10px; color: #555; font-size: 12px; letter-spacing: .08em; }
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
  }
  .line { line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .line.out  { color: #e0e0e0; }
  .line.info { color: #56b6c2; }
  .line.err  { color: #e06c75; }
  .line.inp  { color: #e5c07b; }
  #input-row {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    border-top: 1px solid #1e1e1e;
    background: #111;
    flex-shrink: 0;
    gap: 8px;
  }
  #prompt { color: #98c379; white-space: nowrap; }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e5c07b;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    caret-color: #98c379;
  }
  #send-btn {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }
  #send-btn:hover { border-color: #98c379; color: #98c379; }
  #loading {
    position: fixed;
    inset: 0;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 99;
  }
  #loading p { color: #555; font-size: 13px; letter-spacing: .06em; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #222;
    border-top-color: #98c379;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando Python...</p>
</div>

<div id="topbar">
  <div class="dot r"></div>
  <div class="dot y"></div>
  <div class="dot g"></div>
  <span>rsa_cipher.py — python3</span>
</div>

<div id="terminal"></div>

<div id="input-row">
  <span id="prompt">▶</span>
  <input id="user-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" disabled placeholder="Esperando Python...">
  <button id="send-btn" disabled>Enter</button>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
const terminal = document.getElementById('terminal');
const inputEl  = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const loading  = document.getElementById('loading');

let inputResolve = null;
let history = [];
let histIdx = -1;

function printLine(text, cls) {
  cls = cls || 'out';
  String(text).split('\n').forEach(function(l) {
    var div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = l;
    terminal.appendChild(div);
  });
  terminal.scrollTop = terminal.scrollHeight;
}

function echoInput(val) {
  var div = document.createElement('div');
  div.className = 'line inp';
  div.textContent = '▶ ' + val;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function waitForInput(prompt) {
  if (prompt) printLine(prompt, 'out');
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
  return new Promise(function(resolve) { inputResolve = resolve; });
}

// Exponemos globalmente para que Python la llame via pyodide.globals
window._waitForInput = waitForInput;

function submitInput() {
  if (!inputResolve) return;
  var val = inputEl.value;
  history.unshift(val);
  histIdx = -1;
  echoInput(val);
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  var resolve = inputResolve;
  inputResolve = null;
  resolve(val);
}

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitInput(); }
  if (e.key === 'ArrowUp') {
    if (histIdx < history.length - 1) { histIdx++; inputEl.value = history[histIdx]; }
  }
  if (e.key === 'ArrowDown') {
    if (histIdx > 0) { histIdx--; inputEl.value = history[histIdx]; }
    else { histIdx = -1; inputEl.value = ''; }
  }
});
sendBtn.addEventListener('click', submitInput);

const PYTHON_CODE = `
import math
import random
import string as _string

ABECEDARIO = {
    'a': 1,  'b': 2,  'c': 3,  'd': 4,  'e': 5,
    'f': 6,  'g': 7,  'h': 8,  'i': 9,  'j': 10,
    'k': 11, 'l': 12, 'm': 13, 'n': 14, 'o': 15,
    'p': 16, 'q': 17, 'r': 18, 's': 19, 't': 20,
    'u': 21, 'v': 22, 'w': 23, 'x': 24, 'y': 25,
    'z': 26
}

NUMERO_A_LETRA = {v: k for k, v in ABECEDARIO.items()}
MARCADOR_DIGITO = -1
OFFSET_DIGITO = 27


def generar_abecedario_con_seed(seed):
    letras = list("abcdefghijklmnopqrstuvwxyz")
    try:
        numeros = list(map(int, seed.split("-")))
        if len(numeros) == 26:
            return dict(zip(letras, numeros))
    except ValueError:
        pass
    numeros = list(range(1, 27))
    random.seed(seed)
    random.shuffle(numeros)
    return dict(zip(letras, numeros))


def texto_a_numeros(texto):
    numeros = []
    for ch in texto:
        if ch == " ":
            numeros.append(0)
        elif ch.lower() in ABECEDARIO:
            numeros.append(ABECEDARIO[ch.lower()])
        elif ch.isdigit():
            numeros.append(MARCADOR_DIGITO)
            numeros.append(OFFSET_DIGITO + int(ch))
        else:
            print(f"Ignorado: {ch}")
    return numeros


def numeros_a_texto(numeros):
    resultado = []
    i = 0
    while i < len(numeros):
        v = numeros[i]
        if v == 0:
            resultado.append(" ")
        elif v == MARCADOR_DIGITO:
            i += 1
            if i < len(numeros):
                digito = numeros[i] - OFFSET_DIGITO
                if 0 <= digito <= 9:
                    resultado.append(str(digito))
        elif v in NUMERO_A_LETRA:
            resultado.append(NUMERO_A_LETRA[v])
        else:
            resultado.append(f"[{v}]")
        i += 1
    return "".join(resultado)


def mostrar_abecedario():
    print("\\nCorrespondencia actual:")
    print("-" * 40)
    for letra, numero in ABECEDARIO.items():
        print(f"{letra} = {numero}")
    print("-" * 40)
    print()


async def _input(prompt=''):
    from pyodide.ffi import to_js
    result = await __builtins__.__dict__['_js_wait'](to_js(str(prompt)))
    return str(result)


async def elegir_modo_rsa():
    print("\\nModo RSA")
    print("-------------------")
    print("1 -> Cifrar con e / Descifrar con d")
    print("2 -> Cifrar con d / Descifrar con e")
    print("")
    opcion = (await _input("Elige modo (1/2): ")).strip()
    return "d" if opcion == "2" else "e"


async def obtener_claves_publicas():
    preguntar = await _input("Tienes n y e? (y/n): ")
    d = None
    if preguntar.lower() in ("si", "y", ""):
        n = int(await _input("n: "))
        e = int(await _input("e: "))
    else:
        p = int(await _input("p: "))
        q = int(await _input("q: "))
        n = p * q
        r = (p - 1) * (q - 1)
        print(f"n = {n}")
        print(f"phi(n) = {r}")
        e = int(await _input("e: "))
        d = pow(e, -1, r)
        print(f"d = {d}")
    return n, e, d


async def cifrar_numero():
    numero = int(await _input("Numero a cifrar: "))
    n, e, d = await obtener_claves_publicas()
    modo = await elegir_modo_rsa()
    if modo == "e":
        exponente, modo_texto = e, "e"
    else:
        if d is None:
            d = int(await _input("d: "))
        exponente, modo_texto = d, "d"
    cifrado = pow(numero, exponente, n)
    print(f"\\nNumero cifrado con {modo_texto}:")
    print(cifrado)
    elegir = await _input("\\nComprobar? (y/n): ")
    if elegir.lower() in ("si", "y", ""):
        resultado = pow(cifrado, d if modo == "e" else e, n)
        print(f"\\nResultado: {resultado}")
        print("OK Correcto" if resultado == numero else "FAIL Incorrecto")


async def descifrar_numero():
    numero = int(await _input("Numero a descifrar: "))
    n = int(await _input("n: "))
    modo = await elegir_modo_rsa()
    if modo == "e":
        d = int(await _input("d: "))
        resultado = pow(numero, d, n)
    else:
        e = int(await _input("e: "))
        resultado = pow(numero, e, n)
    print("\\nNumero descifrado:")
    print(resultado)


async def cifrar_texto():
    texto = await _input("Introduce el texto a cifrar: ")
    n, e, d = await obtener_claves_publicas()
    modo = await elegir_modo_rsa()
    if modo == "e":
        exponente, modo_texto = e, "e"
    else:
        if d is None:
            d = int(await _input("d: "))
        exponente, modo_texto = d, "d"
    numeros = texto_a_numeros(texto)
    cifrados = []
    for v in numeros:
        if v == MARCADOR_DIGITO:
            cifrados.append(-pow(abs(v), exponente, n))
        elif v == 0:
            cifrados.append(0)
        else:
            cifrados.append(pow(v, exponente, n))
    print(f"\\nNumeros cifrados con {modo_texto}:")
    print(" ".join(map(str, cifrados)))
    elegir = await _input("\\nComprobar si funciona? (y/n): ")
    if elegir.lower() in ("si", "y", ""):
        descifrados = []
        for c in cifrados:
            if c < 0:
                descifrados.append(MARCADOR_DIGITO)
            elif c == 0:
                descifrados.append(0)
            else:
                descifrados.append(pow(c, d if modo == "e" else e, n))
        texto_recuperado = numeros_a_texto(descifrados)
        print(f"\\nTexto recuperado: {texto_recuperado}")
        print("OK Correcto" if descifrados == numeros else "FAIL Incorrecto")


async def descifrar_texto():
    entrada = await _input("Introduce los numeros cifrados separados por espacios: ")
    cifrados = list(map(int, entrada.split()))
    n = int(await _input("n: "))
    modo = await elegir_modo_rsa()
    descifrados = []
    if modo == "e":
        d = int(await _input("d: "))
        for c in cifrados:
            if c < 0: descifrados.append(MARCADOR_DIGITO)
            elif c == 0: descifrados.append(0)
            else: descifrados.append(pow(c, d, n))
    else:
        e = int(await _input("e: "))
        for c in cifrados:
            if c < 0: descifrados.append(MARCADOR_DIGITO)
            elif c == 0: descifrados.append(0)
            else: descifrados.append(pow(c, e, n))
    texto = numeros_a_texto(descifrados)
    print("\\nNumeros descifrados:")
    print(" ".join(map(str, descifrados)))
    print(f"\\nTexto descifrado: {texto}")


async def crear_seed_personalizada():
    letras = list("abcdefghijklmnopqrstuvwxyz")
    asignaciones = {l: i + 1 for i, l in enumerate(letras)}
    print("\\nIntroduce intercambios.")
    print("Ejemplo: a c")
    print("Escribe 'listo' para terminar.\\n")
    while True:
        entrada = (await _input("Intercambio: ")).strip().lower()
        if entrada == "listo":
            break
        partes = entrada.split()
        if len(partes) != 2:
            print("Error: escribe dos letras separadas por espacio")
            continue
        l1, l2 = partes
        if l1 not in asignaciones or l2 not in asignaciones:
            print("Letras invalidas")
            continue
        asignaciones[l1], asignaciones[l2] = asignaciones[l2], asignaciones[l1]
        print(f"OK {l1} <-> {l2}")
    seed = "-".join(str(asignaciones[l]) for l in letras)
    print("\\nSeed generada:")
    print(seed)
    print()


async def buscar_seed_string():
    print("\\nBuscador de seeds tipo string")
    print("--------------------------------")
    condiciones = {}
    while True:
        letra = (await _input("Letra (ENTER para terminar): ")).lower().strip()
        if letra == "":
            break
        if letra not in _string.ascii_lowercase:
            print("Letra invalida")
            continue
        try:
            numero = int(await _input(f"Numero para '{letra}': "))
        except ValueError:
            print("Numero invalido")
            continue
        if numero < 1 or numero > 26:
            print("Fuera de rango")
            continue
        condiciones[letra] = numero
    longitud = int(await _input("\\nLongitud de la seed: "))
    letras_seed = _string.ascii_lowercase
    intentos = 0
    print("\\nBuscando...\\n")
    while True:
        seed = "".join(random.choice(letras_seed) for _ in range(longitud))
        abecedario = generar_abecedario_con_seed(seed)
        cumple = all(abecedario[l] == num for l, num in condiciones.items())
        if cumple:
            print("=" * 50)
            print("SEED ENCONTRADA")
            print("=" * 50)
            print(f"\\nSeed:\\n{seed}")
            print("\\nCondiciones:")
            for l in sorted(condiciones):
                print(f"{l} = {abecedario[l]}")
            print("\\nAbecedario completo:")
            for l, num in abecedario.items():
                print(f"{l} = {num}")
            print("=" * 50)
            break
        intentos += 1
        if intentos % 10000 == 0:
            print(f"Intentos: {intentos}")


async def start():
    print("")
    print("Cifrado y descifrado RSA")
    print("----------------------------")
    print("n -> numeros")
    print("l -> letras")
    print("s -> seed personalizada")
    print("b -> buscar seeds string")
    print("")
    modo = await _input("Elige opcion: ")
    if modo.lower() in ("n", "numeros"):
        opcion = await _input("cifrar o descifrar (c/d): ")
        if opcion.lower() in ("c", "cifrar"):
            await cifrar_numero()
        elif opcion.lower() in ("d", "descifrar"):
            await descifrar_numero()
    elif modo.lower() in ("l", "letras"):
        seed = await _input("Introduce seed (vacio = normal): ")
        if seed:
            ABECEDARIO.update(generar_abecedario_con_seed(seed))
            NUMERO_A_LETRA.clear()
            NUMERO_A_LETRA.update({v: k for k, v in ABECEDARIO.items()})
        mostrar_abecedario()
        opcion = await _input("cifrar o descifrar (c/d): ")
        if opcion.lower() in ("c", "cifrar"):
            await cifrar_texto()
        elif opcion.lower() in ("d", "descifrar"):
            await descifrar_texto()
    elif modo.lower() in ("s", "seed"):
        await crear_seed_personalizada()
    elif modo.lower() in ("b", "buscar"):
        await buscar_seed_string()
    else:
        print("Opcion invalida")
    reiniciar = await _input("\\nReiniciar? (y/n): ")
    if reiniciar.lower() in ("y", ""):
        await start()

await start()
`;

async function main() {
  const pyodide = await loadPyodide();

  pyodide.setStdout({ batched: (text) => printLine(text, 'out') });
  pyodide.setStderr({ batched: (text) => printLine(text, 'err') });

  // Inyectamos la función directamente en globals de Python (no via js module)
  pyodide.globals.set('_js_wait', (prompt) => {
    return waitForInput(prompt ? prompt : '');
  });

  // Parcheamos builtins para que _input pueda acceder a _js_wait
  await pyodide.runPythonAsync(`
import builtins
builtins.__dict__['_js_wait'] = _js_wait
`);

  loading.style.display = 'none';
  printLine('Python 3.11 listo.', 'info');

  await pyodide.runPythonAsync(PYTHON_CODE).catch(function(e) {
    printLine('', 'out');
    printLine('Error: ' + e.message, 'err');
  });

  printLine('', 'out');
  printLine('— Programa terminado. Recarga la pagina para reiniciar. —', 'info');
  inputEl.placeholder = 'Recarga la página para reiniciar';
}

main().catch(function(e) {
  loading.style.display = 'none';
  printLine('Error al cargar Pyodide: ' + e.message, 'err');
});
</script>
