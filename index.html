<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RSA</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
}

#terminal {
  padding: 10px;
  height: 90vh;
  overflow-y: auto;
  white-space: pre-wrap;
}

#inputBox {
  width: 100%;
  padding: 10px;
  background: #111;
  color: white;
  border: none;
  outline: none;
  font-family: monospace;
}
</style>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
</head>

<body>

<div id="terminal"></div>
<input id="inputBox" placeholder="Escribe aquí y pulsa ENTER">

<script>
let pyodide;
let terminal = document.getElementById("terminal");
let inputBox = document.getElementById("inputBox");

let resolver = null;

// imprimir en terminal
function print(text){
  terminal.innerText += text + "\n";
  terminal.scrollTop = terminal.scrollHeight;
}

// INPUT estilo consola
function input(promptText){
  print(promptText);

  return new Promise(resolve => {
    resolver = resolve;
  });
}

inputBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && resolver){
    let value = inputBox.value;
    inputBox.value = "";
    resolver(value);
    resolver = null;
  }
});

async function main(){
  pyodide = await loadPyodide();

  // 🔥 conectamos Python con JS terminal
  pyodide.globals.set("js_input", input);
  pyodide.globals.set("js_print", print);

  await pyodide.runPythonAsync(`
import js
import builtins

print = js.js_print

async def input(prompt=""):
    return await js.js_input(prompt)

builtins.input = input
  `);

  print("✔ Python listo");
}

async function run(){
  const code = await fetch("main.py").then(r => r.text());
  await pyodide.runPythonAsync(code);
}

main();
run();
</script>

</body>
</html>
