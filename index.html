<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  color:#e0e0e0;
  font-family:monospace;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#terminal{
  flex:1;
  padding:10px;
  overflow-y:auto;
  white-space:pre-wrap;
}

#bar{
  display:flex;
  border-top:1px solid #222;
}

#input{
  flex:1;
  padding:10px;
  background:#111;
  border:none;
  color:white;
  outline:none;
  font-family:monospace;
}

button{
  padding:10px 20px;
  background:#222;
  color:white;
  border:none;
  cursor:pointer;
}

.line{margin:2px 0}
.out{color:#ddd}
.inp{color:#ffd166}
.err{color:#ff5c5c}
.info{color:#5cc8ff}
</style>
</head>

<body>

<div id="terminal"></div>

<div id="bar">
  <input id="input" disabled placeholder="cargando...">
  <button id="btn" disabled>OK</button>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<script>
const term=document.getElementById("terminal");
const input=document.getElementById("input");
const btn=document.getElementById("btn");

let resolver=null;

function print(t,cls="out"){
  const d=document.createElement("div");
  d.className="line "+cls;
  d.textContent=t;
  term.appendChild(d);
  term.scrollTop=term.scrollHeight;
}

function ask(msg){
  print(msg,"out");
  input.disabled=false;
  btn.disabled=false;
  input.focus();
  return new Promise(r=>resolver=r);
}

function submit(){
  if(!resolver) return;
  const v=input.value;
  print("> "+v,"inp");
  input.value="";
  input.disabled=true;
  btn.disabled=true;
  resolver(v);
  resolver=null;
}

btn.onclick=submit;
input.onkeydown=e=>{if(e.key==="Enter")submit();};

async function main(){
  const pyodide=await loadPyodide();

  pyodide.setStdout({batched:t=>print(t,"out")});
  pyodide.setStderr({batched:t=>print(t,"err")});

  pyodide.globals.set("_ask",ask);

  await pyodide.runPythonAsync(`
import builtins
from js import _ask

async def input(prompt=""):
    return await _ask(str(prompt))

builtins.input = input
`);

  input.placeholder="escribe aquí...";
  input.disabled=false;
  btn.disabled=false;

  print("Terminal lista","info");

  await pyodide.runPythonAsync(`
print("Hola, funciona la consola")
x = input("Dime algo: ")
print("Escribiste:", x)
`);
}

main();
</script>

</body>
</html>
