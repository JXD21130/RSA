<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSA</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: #e0e0e0;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#terminal {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  white-space: pre-wrap;
}

#inputBar {
  display: flex;
  border-top: 1px solid #222;
}

#input {
  flex: 1;
  background: #111;
  border: none;
  color: white;
  padding: 10px;
  outline: none;
  font-family: monospace;
}

button {
  background: #222;
  color: white;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
}

.line { margin: 2px 0; }
.out { color: #ddd; }
.err { color: #ff5c5c; }
.info { color: #5cc8ff; }
.inp { color: #ffd166; }
</style>
</head>

<body>

<div id="terminal"></div>

<div id="inputBar">
  <input id="input" placeholder="Escribe aquí..." disabled />
  <button id="btn" disabled>Enter</button>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<script>
const term = document.getElementById("terminal");
const input = document.getElementById("input");
const btn = document.getElementById("btn");

let resolver = null;

function print(text, cls="out"){
  const div = document.createElement("div");
  div.className = "line " + cls;
  div.textContent = text;
  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function ask(promptText){
  print(promptText, "out");
  input.disabled = false;
  btn.disabled = false;
  input.focus();

  return new Promise(res => resolver = res);
}

function submit(){
  if(!resolver) return;
  const val = input.value;
  print("> " + val, "inp");

  input.value = "";
  input.disabled = true;
  btn.disabled = true;

  const r = resolver;
  resolver = null;
  r(val);
}

btn.onclick = submit;
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") submit();
});

async function download(filename, text){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text]));
  a.download = filename;
  a.click();
}

async function main(){
  const pyodide = await loadPyodide();

  pyodide.setStdout({ batched: t => print(t, "out") });
  pyodide.setStderr({ batched: t => print(t, "err") });

  pyodide.globals.set("_js_input", ask);
  pyodide.globals.set("download_file", download);

  await pyodide.runPythonAsync(`
import builtins
from js import _js_input, download_file

async def input_async(msg=""):
    return await _js_input(str(msg))

builtins.input = input_async
download = download_file
`);

  print("RSA Terminal listo", "info");

  await pyodide.runPythonAsync(`
print("Sistema cargado correctamente")
`);

  print("Listo para usar", "info");
}

main();
</script>

</body>
</html>
